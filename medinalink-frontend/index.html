<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FDF8F2" />
    <title>MedinaLink — La voix citoyenne du Maroc</title>
    <meta name="description" content="Signalez les problèmes municipaux, suivez leur résolution et participez à l'amélioration de votre ville." />
    <script>
      (function() {
        var t = localStorage.getItem('ml-theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      html { scroll-behavior: smooth; }
      body { margin: 0; background: var(--void, #FDF8F2); }
      #root { opacity: 0; transition: opacity 0.5s ease; }
      #root.ready { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        document.getElementById('root').classList.add('ready');
      });
    </script>
  </body>
</html>
