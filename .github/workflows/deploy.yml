name: MedinaLink Deploy

on:
  workflow_run:
    workflows: ["MedinaLink CI"]
    types: [completed]
    branches: [main]

jobs:

  # ── Deploy Frontend → Vercel ──────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: medinalink-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: medinalink-frontend
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Deploy AI Service → Railway ───────────────────────────────
  deploy-ai:
    name: Deploy AI Service (Railway)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy AI to Railway
        working-directory: medinalink-ai
        run: |
          railway up \
            --project 46a0ea26-6e17-4bf2-9d10-326eb96b3826 \
            --service medinalink-ai \
            --environment production \
            --detach \
            --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
