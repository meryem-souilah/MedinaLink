name: MedinaLink CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:

  # ── Build Backend ─────────────────────────────────────────────
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medinalink_backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build & test
        run: mvn -B clean package -DskipTests --no-transfer-progress
        env:
          MEDINALINK_JWT_SECRET: ${{ secrets.JWT_SECRET || 'medinalink-super-secret-key-2024-casablanca-maroc-jwt' }}
          DB_URL:                jdbc:postgresql://localhost:5432/medinalink_test
          DB_USER:               test
          DB_PASSWORD:           test
          REDIS_ENABLED:         "false"

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: medinalink-backend
          path: medinalink_backend/target/medinalink.war

  # ── Build Frontend ────────────────────────────────────────────
  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medinalink-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: medinalink-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8080/medinalink/api/v1' }}
          VITE_WS_URL:  ${{ secrets.VITE_WS_URL  || 'ws://localhost:8080/medinalink' }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: medinalink-frontend
          path: medinalink-frontend/dist/

  # ── Build AI Service ──────────────────────────────────────────
  ai:
    name: AI Service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medinalink-ai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: medinalink-ai/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py
